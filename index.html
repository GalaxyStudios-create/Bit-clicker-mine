<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Биткоин Кликер</title>
    <style>
        /* Анимации для декора */
        @keyframes float-up {
            from {
                transform: translateY(0);
                opacity: 1;
            }
            to {
                transform: translateY(-80px);
                opacity: 0;
            }
        }

        @keyframes pulse-glow {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3), inset 0 0 15px rgba(255, 255, 255, 0.3), 0 0 10px #ff9900;
            }
            50% {
                transform: scale(1.02);
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4), inset 0 0 20px rgba(255, 255, 255, 0.4), 0 0 25px #ffc400;
            }
        }
        
        @keyframes scroll-bg {
            from { background-position: 0 0; }
            to { background-position: 0 -200px; }
        }

        @keyframes text-glitch {
            2%, 64% { transform: translate(2px, 0) skew(0deg); }
            4%, 60% { transform: translate(-2px, 0) skew(0deg); }
            62% { transform: translate(0, 0) skew(5deg); }
        }

        /* Общие стили */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: #0d0d0d;
            color: #f0f0f0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            overflow: hidden;
        }

        /* ДЕКОР: Анимированный фон */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(to right, rgba(255, 153, 0, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 153, 0, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: scroll-bg 10s linear infinite;
            z-index: -1;
        }

        .game-container {
            display: flex;
            flex-wrap: wrap;
            width: 95%;
            max-width: 1200px;
            background-color: rgba(43, 43, 43, 0.95);
            border: 1px solid #444;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        /* Колонки */
        .main-column {
            flex: 2;
            padding: 20px 40px;
            display: flex;
            flex-direction: column;
            border-right: 2px solid #444;
            min-width: 300px;
        }

        .side-column {
            flex: 1;
            padding: 20px;
            background-color: rgba(34, 34, 34, 0.9);
            display: flex;
            flex-direction: column;
            min-width: 280px;
        }

        /* Заголовок и баланс */
        header { text-align: center; border-bottom: 2px solid #444; padding-bottom: 20px; }
        
        /* ДЕКОР: Глитч-эффект на заголовке */
        header h1 {
            color: #ff9900;
            margin-top: 0;
            font-size: 2.2em;
            text-shadow: 0 0 5px #ff9900;
        }
        header h1:hover {
            animation: text-glitch 1s linear infinite;
        }

        .balance-display h2 { font-size: 2.5em; margin: 10px 0; color: #fff; word-break: break-all; }
        .stats-display { display: flex; justify-content: space-around; margin-top: 15px; color: #aaa; }

        /* "Моделька" Биткоина */
        .click-area {
            position: relative; /* Нужно для позиционирования вылетающих чисел */
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
        }

        .coin {
            width: 200px;
            height: 200px;
            background: linear-gradient(45deg, #ffc400, #ff9900);
            border-radius: 50%;
            border: 8px solid #b36b00;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            /* ДЕКОР: Пульсация монетки */
            animation: pulse-glow 3s infinite ease-in-out;
        }

        .coin:active {
            transform: scale(0.98) !important;
            animation: none; /* Отключаем пульсацию при клике */
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.4), inset 0 0 25px rgba(0, 0, 0, 0.2) !important;
        }
        .coin-symbol { font-size: 100px; font-weight: bold; color: #fff; text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.4); }

        /* ДЕКОР: Стили для вылетающих чисел */
        .floating-number {
            position: absolute;
            font-size: 1.5em;
            font-weight: bold;
            color: #ffc400;
            text-shadow: 0 0 5px black;
            pointer-events: none; /* Чтобы не мешали кликать по монете */
            animation: float-up 1.5s ease-out forwards;
        }

        /* Улучшения */
        h2 { color: #ff9900; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .upgrades-list { max-height: calc(100vh - 450px); min-height: 200px; overflow-y: auto; padding-right: 10px; }
        .upgrade-item { background-color: #333; border: 1px solid #444; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; flex-direction: column; }
        .upgrade-item p { margin: 0 0 10px 0; }
        .upgrade-title { font-weight: bold; color: #ff9900; }
        .upgrade-stats { font-size: 0.9em; color: #ccc; }

        button {
            width: 100%;
            padding: 12px;
            font-size: 1em;
            background-color: #ff9900;
            color: #1a1a1a;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s ease, box-shadow 0.3s ease, transform 0.2s ease;
            margin-top: auto;
            border: 2px solid transparent;
        }
        button:hover:not(:disabled) { background-color: #ffb700; transform: translateY(-2px); }
        button:disabled { background-color: #555; color: #888; cursor: not-allowed; }
        
        /* ДЕКОР: Подсветка доступных кнопок */
        button.can-afford {
            border-color: #ffc400;
            box-shadow: 0 0 15px #ff9900;
            animation: pulse-glow 2s infinite ease-in-out;
        }

        /* Перерождение */
        .rebirth-section { margin-top: auto; padding-top: 20px; border-top: 1px solid #444;}
        .rebirth-section p { color: #ccc; font-size: 0.9em; }

        /* Скроллбар */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #2b2b2b; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #ff9900; }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="main-column">
            <header>
                <h1>Биткоин Кликер</h1>
                <div class="balance-display">
                    <p>Ваш баланс:</p>
                    <h2 id="balance">0.00000000</h2>
                    <span>BTC</span>
                </div>
                <div class="stats-display">
                    <p>За клик: <span id="click-power">0.00000001</span></p>
                    <p>В секунду: <span id="auto-per-second">0.00000000</span></p>
                </div>
            </header>
            
            <main id="click-area" class="click-area">
                <div id="bitcoin-button" class="coin">
                    <span class="coin-symbol">₿</span>
                </div>
            </main>
        </div>

        <div class="side-column">
            <div class="upgrades-section">
                <h2>Улучшения</h2>
                <div id="upgrades-list"></div>
            </div>

            <div class="rebirth-section">
                <h2>Перерождение</h2>
                <p>Сбрасывает прогресс, но навсегда увеличивает ваш общий доход на +100% за каждое перерождение.</p>
                <p>Текущий бонус: <span id="rebirth-multiplier">x1</span></p>
                <button id="rebirth-button" disabled>Переродиться (нужно <span id="rebirth-cost">1.00000000</span> BTC)</button>
            </div>
        </div>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
