<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GalaxyHosting | Твой бесплатный Minecraft сервер</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <i class="fas fa-user-rocket"></i> Galaxy<span>Host</span>
        </div>
        <nav>
            <a href="#" class="active"><i class="fas fa-server"></i> Сервер</a>
            <a href="#"><i class="fas fa-terminal"></i> Консоль</a>
            <a href="#"><i class="fas fa-file-code"></i> Файлы</a>
            <a href="#"><i class="fas fa-users"></i> Игроки</a>
            <a href="#"><i class="fas fa-puzzle-piece"></i> Плагины</a>
            <a href="#"><i class="fas fa-cogs"></i> Настройки</a>
        </nav>
    </div>

    <main class="main-content">
        <header>
            <div class="server-status">
                <span id="status-indicator" class="status-off"></span>
                Статус: <span id="status-text">Оффлайн</span>
            </div>
            <div class="user-profile">
                <span>Администратор</span>
                <i class="fas fa-user-circle"></i>
            </div>
        </header>

        <section class="dashboard">
            <div class="action-buttons">
                <button id="btn-start" class="btn btn-start"><i class="fas fa-play"></i> Запустить</button>
                <button id="btn-stop" class="btn btn-stop" disabled><i class="fas fa-stop"></i> Стоп</button>
                <button id="btn-restart" class="btn btn-restart" disabled><i class="fas fa-redo"></i> Рестарт</button>
            </div>

            <div class="stats-grid">
                <div class="card">
                    <i class="fas fa-memory"></i>
                    <h3>Оперативная память</h3>
                    <p><span>6144 MB</span> / 6144 MB</p>
                    <div class="progress-bar"><div class="progress" style="width: 0%" id="ram-progress"></div></div>
                </div>
                <div class="card">
                    <i class="fas fa-microchip"></i>
                    <h3>Процессор (CPU)</h3>
                    <p id="cpu-load">0%</p>
                    <div class="progress-bar"><div class="progress" style="width: 0%" id="cpu-progress"></div></div>
                </div>
                <div class="card">
                    <i class="fas fa-hdd"></i>
                    <h3>Диск (SSD)</h3>
                    <p>10 ГБ</p>
                </div>
            </div>

            <div class="console-container">
                <div class="console-header">Консоль сервера</div>
                <div class="console-body" id="console">
                    <p class="msg">[System] Ожидание запуска сервера...</p>
                </div>
                <div class="console-input">
                    <span>></span>
                    <input type="text" placeholder="Введите команду..." id="cmd-input">
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
